[build]
# Build context is the repo root so the Dockerfile can access
# both agents/ source code and vault/target/dev/ contract ABIs.
dockerfilePath   = "agents/Dockerfile"

[deploy]
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Railway sets $PORT automatically and routes HTTP to it.
# start.sh passes $PORT to uvicorn so the faucet is reachable on the
# Railway-generated public URL (set as NEXT_PUBLIC_FAUCET_API_URL).
healthcheckPath    = "/health"
healthcheckTimeout = 10